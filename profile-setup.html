<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreaseVision | Profile Setup</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="profile.css" />

  <style>
    .profile-setup-layout {
      width: min(980px, 96vw);
      min-height: calc(100dvh - 74px);
      margin: 0 auto;
      padding: var(--space-3);
      display: grid;
      place-items: center;
    }

    .profile-setup-card {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-offwhite) 0%, var(--panel-warm) 100%);
      color: var(--ink);
      border-radius: 14px;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.28);
      padding: clamp(20px, 4vw, 34px);
      display: grid;
      gap: 22px;
    }

    .setup-heading {
      display: grid;
      gap: 8px;
      text-align: center;
    }

    .setup-heading h2 {
      margin: 0;
      font-family: "Oswald", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: clamp(1.7rem, 4vw, 2.35rem);
      color: #1f252b;
    }

    .setup-heading p {
      margin: 0;
      color: #3f4b44;
      font-size: 1.05rem;
    }

    .profile-setup-body {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 26px;
      align-items: center;
    }

    .avatar-panel {
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    .setup-avatar-preview {
      width: 146px;
      height: 146px;
      border-radius: 50%;
      border: 2px solid #b0a694;
      object-fit: cover;
      background: #f6f3ea;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
    }

    .avatar-actions {
      width: 100%;
      display: grid;
      gap: 8px;
    }

    .setup-form-area {
      display: grid;
      gap: 16px;
    }

    .setup-form-row {
      display: grid;
      gap: 8px;
    }

    .setup-form-row label {
      margin: 0;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #2c3531;
      font-weight: 700;
    }

    .setup-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
    }

    .setup-feedback {
      min-height: 22px;
      font-size: 0.94rem;
      font-weight: 700;
    }

    .setup-feedback.error {
      color: var(--error);
    }

    .setup-feedback.success {
      color: var(--success);
    }

    @media (max-width: 700px) {
      .profile-setup-body {
        grid-template-columns: 1fr;
      }

      .setup-actions {
        justify-content: stretch;
      }

      .setup-actions .action-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="dashboard-shell">
    <header class="dash-header">
      <div class="brand-wrap">
        <h1>CreaseVision Control Desk</h1>
      </div>

      <div class="profile-wrap" aria-label="Account actions">
        <a class="logout-btn" href="index.html" data-logout="true">Logout</a>
      </div>
    </header>

    <main class="profile-setup-layout" aria-label="Profile setup workspace">
      <section class="profile-setup-card" aria-label="Account profile setup">
        <div class="setup-heading">
          <h2>Profile Setup</h2>
          <p>Set your account name and display picture once. You can update them later from Profile Settings.</p>
        </div>

        <div class="profile-setup-body">
          <div class="avatar-panel">
            <img id="setup-avatar-preview" class="setup-avatar-preview" alt="Profile preview" />

            <div class="avatar-actions">
              <button id="choose-image-btn" type="button" class="action-btn primary">Choose Image</button>
              <button id="remove-image-btn" type="button" class="action-btn secondary">Remove Image</button>
            </div>
          </div>

          <form id="profile-setup-form" class="setup-form-area" novalidate>
            <div class="setup-form-row">
              <label for="setup-name">Account Name</label>
              <input id="setup-name" class="setup-input" type="text" placeholder="Enter your name here" maxlength="80" autocomplete="off" required />
            </div>

            <div class="setup-form-row">
              <label for="setup-image-file">Display Picture</label>
              <input id="setup-image-file" class="setup-input file-input" type="file" accept="image/*" />
            </div>

            <div id="setup-feedback" class="setup-feedback" aria-live="polite"></div>

            <div class="setup-actions">
              <button id="continue-btn" type="submit" class="action-btn primary">Save & Continue</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script src="auth-header.js" defer></script>

  <script>
    (() => {
      "use strict";

      const DEFAULT_AVATAR = `data:image/svg+xml;utf8,${encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
          <defs>
            <linearGradient id="avatarGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#c9d2c3"/>
              <stop offset="100%" stop-color="#9ca997"/>
            </linearGradient>
          </defs>
          <rect width="96" height="96" rx="48" fill="url(#avatarGrad)"/>
          <circle cx="48" cy="36" r="16" fill="#eef2e8"/>
          <path d="M20 82c2-14 15-24 28-24s26 10 28 24" fill="#eef2e8"/>
        </svg>`
      )}`;

      const form = document.getElementById("profile-setup-form");
      const nameInput = document.getElementById("setup-name");
      const imageInput = document.getElementById("setup-image-file");
      const avatarPreview = document.getElementById("setup-avatar-preview");
      const chooseImageButton = document.getElementById("choose-image-btn");
      const removeImageButton = document.getElementById("remove-image-btn");
      const feedback = document.getElementById("setup-feedback");

      let currentImage = "";
      let currentUser = null;

      function setFeedback(type, message) {
        feedback.className = "setup-feedback " + type;
        feedback.textContent = message || "";
      }

      function clearFeedback() {
        feedback.className = "setup-feedback";
        feedback.textContent = "";
      }

      function renderAvatar() {
        avatarPreview.src = currentImage || DEFAULT_AVATAR;
      }

      function readImageFile(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error("Unable to read image."));
          reader.readAsDataURL(file);
        });
      }

      function waitForAuth(callback, attempts = 0) {
        if (window.CWWAuth && typeof window.CWWAuth.getSessionUser === "function") {
          callback();
          return;
        }

        if (attempts > 60) {
          window.location.href = "index.html";
          return;
        }

        window.setTimeout(() => waitForAuth(callback, attempts + 1), 50);
      }

      function setupDoneKey(email) {
        return "cv_profile_setup_done::" + String(email || "").trim().toLowerCase();
      }

      async function loadSessionUser() {
        const user = await window.CWWAuth.getSessionUser();

        if (!user || !user.email) {
          window.location.href = "index.html";
          return;
        }

        currentUser = user;
        nameInput.value = String(user.name || "");
        currentImage = String(user.profileImageUrl || "");
        renderAvatar();
      }

      function bindEvents() {
        chooseImageButton.addEventListener("click", () => {
          imageInput.click();
        });

        removeImageButton.addEventListener("click", () => {
          currentImage = "";
          imageInput.value = "";
          renderAvatar();
        });

        imageInput.addEventListener("change", async (event) => {
          const file = event.target.files && event.target.files[0];

          if (!file) {
            return;
          }

          try {
            currentImage = await readImageFile(file);
            renderAvatar();
          } catch {
            setFeedback("error", "Unable to load the selected image.");
          }
        });

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          clearFeedback();

          const name = String(nameInput.value || "").trim();

          if (!name) {
            setFeedback("error", "Please enter your account name.");
            nameInput.focus();
            return;
          }

          const result = window.CWWAuth.updateCurrentUserProfile({
            name,
            profileImageUrl: currentImage
          });

          if (!result.ok || !result.user) {
            setFeedback("error", result.message || "Unable to save profile setup.");
            return;
          }

          sessionStorage.setItem("cv_profile_setup_done", "1");
          localStorage.setItem(setupDoneKey(result.user.email), "1");

          setFeedback("success", "Profile setup saved.");
          window.location.href = "dashboard.html";
        });
      }

      async function init() {
        renderAvatar();
        bindEvents();
        await loadSessionUser();
      }

      waitForAuth(init);
    })();
  </script>
</body>
</html>
