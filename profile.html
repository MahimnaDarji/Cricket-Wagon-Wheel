<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreaseVision | Profile Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="profile.css" />
</head>
<body>
  <div class="dashboard-shell">
    <header class="dash-header">
      <div class="brand-wrap">
        <h1>CreaseVision Control Desk</h1>
      </div>
      <div class="profile-wrap" aria-label="Account actions">
        <a class="profile-btn active" href="profile.html" aria-current="page">Profile Settings</a>
        <a class="logout-btn" href="index.html" data-logout="true">Logout</a>
      </div>
    </header>

    <main class="settings-layout" aria-label="Profile settings workspace">
      <aside class="left-panel" aria-label="Profile summary card">
        <img id="profile-avatar-preview" class="profile-avatar" alt="Profile avatar" />
        <h2 id="summary-name" class="summary-name">User</h2>
        <p id="summary-email" class="summary-email">user@example.com</p>
        <button id="edit-profile-btn" type="button" class="action-btn primary">Edit Profile</button>
        <a href="dashboard.html" class="action-btn secondary nav-back-btn">Back to Dashboard</a>
      </aside>

      <section class="right-panel" aria-label="Main settings area">
        <nav class="tabs" aria-label="Profile sections">
          <button id="tab-profile" class="tab-btn active" type="button" aria-selected="true" data-target="panel-profile">Profile Info</button>
          <button id="tab-history" class="tab-btn" type="button" aria-selected="false" data-target="panel-history">History</button>
        </nav>

        <section id="panel-profile" class="tab-panel active" aria-label="Profile info panel">
          <article class="settings-card" aria-label="Profile info section">
            <h2>Profile Info</h2>
            <p class="card-note">Keep your account details up to date.</p>

            <form id="profile-form" class="settings-form" novalidate>
              <div class="form-row">
                <label for="profile-name">Name</label>
                <input id="profile-name" name="name" class="setup-input" type="text" maxlength="80" required />
              </div>

              <div class="form-row">
                <label for="profile-email">Email</label>
                <input id="profile-email" name="email" class="setup-input" type="email" required />
              </div>

              <div class="form-row">
                <label for="profile-image-file">Profile Image</label>
                <input id="profile-image-file" type="file" accept="image/*" class="setup-input file-input" />
              </div>

              <div id="profile-feedback" class="feedback" aria-live="polite"></div>

              <div class="form-actions">
                <button class="action-btn primary" type="submit">Save Changes</button>
              </div>
            </form>
          </article>
        </section>

        <section id="panel-history" class="tab-panel" aria-label="History panel">
          <article class="settings-card history-wrap" aria-label="Wagon wheel history cards">
            <h2>History</h2>
            <p class="card-note">Your completed wagon wheel innings and exports.</p>
            <div id="history-list" class="history-grid" aria-live="polite"></div>
          </article>
        </section>
      </section>
    </main>
  </div>

  <script src="auth-header.js" defer></script>
  <script src="profile.js" defer></script>
</body>
</html>
